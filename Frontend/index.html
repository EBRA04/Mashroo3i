<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport meta tag is CRITICAL for mobile.
      Without it, mobile browsers zoom out to show the "desktop" version.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="/favicon.png" />

    <title>Mashroo3i — Smart Startup Planning</title>
    <meta
      name="description"
      content="AI-powered business idea evaluation and startup planning platform for Jordanian entrepreneurs."
    />
  </head>
  <body>
    <!--
      React mounts here.
      createRoot(document.getElementById('root')) in main.jsx targets this div.
    -->
    <div id="root"></div>

    <!--
      Vite replaces this script tag at build time with the correct hashed
      bundle path. In dev it connects to Vite's dev server with HMR.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
